# Altinity Deploy ClickHouse — single-node Compose stack
# 1 ClickHouse server + 1 Keeper. Designed to be extended.
# Substitute ${CH_SERVER_IMAGE} and ${CH_KEEPER_IMAGE} from the build skill.
#
# Persistent state lives in ./data/ (bind mounts) — see SKILL.md Step 3 for
# directory creation and ownership setup. The ./data/ tree contains all data
# and logs and is what you back up.

services:
  keeper:
    image: ${CH_KEEPER_IMAGE}
    container_name: clickhouse-keeper
    hostname: keeper
    restart: unless-stopped
    volumes:
      - ./data/keeper:/var/lib/clickhouse-keeper
      - ./data/keeper-logs:/var/log/clickhouse-keeper
      - ./keeper-config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    networks:
      - clickhouse-net
    ports:
      - "127.0.0.1:9181:9181"   # Keeper client port (bound to localhost by default)

  clickhouse:
    image: ${CH_SERVER_IMAGE}
    container_name: clickhouse-server
    hostname: clickhouse
    restart: unless-stopped
    depends_on:
      - keeper
    environment:
      # Skip the upstream entrypoint's auto-management of the 'default' user.
      # We control users via mounted users.d/ files (which are read-only).
      # Without this, the entrypoint tries to write users.d/default-user.xml
      # and crash-loops the container.
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./data/clickhouse-logs:/var/log/clickhouse-server
      - ./config.d:/etc/clickhouse-server/config.d:ro
      - ./users.d:/etc/clickhouse-server/users.d:ro
    networks:
      - clickhouse-net
    ports:
      - "127.0.0.1:8123:8123"   # HTTP
      - "127.0.0.1:9000:9000"   # Native TCP
    # Production: uncomment and tune. Even rough limits beat unlimited.
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "4"
    #       memory: "8G"

networks:
  clickhouse-net:
    driver: bridge
